<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БоброУслуги | FULL ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --main: #0054a1; --bg: #f0f2f5; --card: #ffffff; --text: #333; --ok: #2e7d32; --err: #d32f2f; --wb: #7b1fa2; --black: #000; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .hidden { display: none !important; }
        
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; z-index: 10000; transition: 0.3s; opacity: 0; pointer-events: none; text-align: center; color: white; font-weight: bold; }
        #toast.show { opacity: 1; top: 30px; }

        header { padding: 15px; background: var(--main); color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 2000; }
        .container { max-width: 500px; margin: auto; padding: 12px; }
        .card { background: var(--card); padding: 16px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .nav-bar { display: flex; background: white; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #777; cursor: pointer; }
        .nav-tab.active { color: var(--main); font-weight: bold; }

        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        
        #chat-box { height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 10px; background: #fafafa; border-radius: 10px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 10px; background: #e9e9eb; max-width: 85%; }
        .msg-my { background: var(--main); color: white; align-self: flex-end; }
        
        .user-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="auth-screen" class="container" style="margin-top: 50px;">
    <div class="card" style="text-align: center;">
        <h1 style="color: var(--main);">🦫 БоброУслуги</h1>
        <input type="text" id="l-name" placeholder="Имя">
        <input type="password" id="l-pass" placeholder="Пароль">
        <button onclick="login()" class="btn" style="background:var(--main);">ВОЙТИ</button>
    </div>
</div>

<div id="app" class="hidden">
    <header>
        <b>👤 <span id="u-display"></span></b>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:20px;">🚪</button>
    </header>

    <div class="container">
        <div id="tab-gos">
            <div class="card">
                <h3>📜 Мой Паспорт</h3>
                <div id="passport-status">Проверка...</div>
                <div id="passport-view" class="hidden" style="border: 2px dashed var(--main); padding: 10px; border-radius: 10px; margin-top: 10px;">
                    <p>ФИО: <b id="pv-name"></b></p>
                    <p>Возраст: <b id="pv-age"></b></p>
                </div>
            </div>
            <div class="card">
                <h3>✍️ Анкета на паспорт</h3>
                <input type="text" id="ank-name" placeholder="ФИО">
                <input type="number" id="ank-age" placeholder="Возраст">
                <button onclick="sendPassportReq()" class="btn" style="background:var(--main);">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div id="tab-work" class="hidden">
            <div class="card" style="background: var(--ok); color: white;">
                <h2 id="job-title" style="margin:0;">Безработный</h2>
                <p>ЗП: <span id="job-pay">0</span> ББ/нед.</p>
                <button id="claim-salary-btn" onclick="claimSalary()" class="btn" style="background: white; color: var(--ok);">ВЗЯТЬ ЗП</button>
            </div>
            <div class="card">
                <h4>➕ Создать вакансию</h4>
                <input type="text" id="v-title" placeholder="Профессия">
                <input type="number" id="v-pay" placeholder="ЗП в неделю">
                <button onclick="addVac()" class="btn" style="background:var(--ok);">ОПУБЛИКОВАТЬ</button>
            </div>
            <div id="vac-list"></div>
        </div>

        <div id="tab-bank" class="hidden">
            <div class="card" style="background: var(--ok); color: white; text-align: center;">
                <h1 id="bank-bal">0 ББ</h1>
            </div>
            <div class="card">
                <h3>💸 Перевод</h3>
                <input type="text" id="tr-to" placeholder="Кому">
                <input type="number" id="tr-sum" placeholder="Сумма">
                <button onclick="doTransfer()" class="btn" style="background: var(--ok);">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div id="tab-wb" class="hidden">
            <div class="card">
                <h4>💜 Продать товар</h4>
                <input type="text" id="m-name" placeholder="Что продаем?">
                <input type="number" id="m-cost" placeholder="Цена">
                <button onclick="addMarketItem()" class="btn" style="background:var(--wb);">ВЫСТАВИТЬ</button>
            </div>
            <div id="market-list"></div>
        </div>

        <div id="tab-chat" class="hidden">
            <div id="chat-box" class="card"></div>
            <div style="display:flex; gap:5px; margin-top:5px;">
                <input type="text" id="msg-input" placeholder="Текст...">
                <button onclick="sendMsg()" class="btn" style="background:var(--main); width:60px;">➜</button>
            </div>
        </div>

        <div id="tab-admin" class="hidden">
            <div class="card" style="border: 2px solid var(--err);">
                <h2 style="color:var(--err)">👑 АДМИН-ПАНЕЛЬ</h2>
                
                <div id="adm-miron-only" class="hidden">
                    <h4>💰 Печать ББ</h4>
                    <input type="number" id="print-sum" placeholder="Сумма">
                    <button onclick="printMoney()" class="btn" style="background:var(--black);">ДОБАВИТЬ МНЕ</button>
                    
                    <h4>👔 Кадры</h4>
                    <input type="text" id="hire-user" placeholder="Имя игрока">
                    <input type="text" id="hire-job" placeholder="Профессия">
                    <input type="number" id="hire-pay" placeholder="ЗП">
                    <button onclick="adminHire(true)" class="btn" style="background:var(--ok);">НАЗНАЧИТЬ</button>
                    <button onclick="adminHire(false)" class="btn" style="background:var(--err);">УВОЛИТЬ</button>
                    <hr>
                </div>

                <h4>🔨 Штраф</h4>
                <input type="text" id="fine-user" placeholder="Кому">
                <input type="number" id="fine-sum" placeholder="Сколько">
                <button onclick="sendFine()" class="btn" style="background:var(--err);">ОШТРАФОВАТЬ</button>

                <h4>📋 Заявки на паспорт</h4>
                <div id="adm-pass-list"></div>

                <h4>👥 Граждане</h4>
                <div id="users-list-admin" class="card" style="font-size:12px;"></div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-tab active" onclick="setTab('gos', this)">🏛️<br>Гос</div>
        <div class="nav-tab" onclick="setTab('work', this)">💼<br>Работа</div>
        <div class="nav-tab" onclick="setTab('bank', this)">💰<br>Банк</div>
        <div class="nav-tab" onclick="setTab('wb', this)">🛍️<br>ВБ</div>
        <div class="nav-tab" onclick="setTab('chat', this)">💬<br>Чат</div>
        <div class="nav-tab hidden" id="n-admin" onclick="setTab('admin', this)">👑<br>Админ</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBv4E4qHpzYIPQMx48iLMNyfCPCFZQ9TOI",
        authDomain: "bobro-uslugi-3fe4d.firebaseapp.com",
        databaseURL: "https://bobro-uslugi-3fe4d-default-rtdb.firebaseio.com",
        projectId: "bobro-uslugi-3fe4d",
        storageBucket: "bobro-uslugi-3fe4d.firebasestorage.app",
        messagingSenderId: "791582806185",
        appId: "1:791582806185:web:205da453ca68c6299059b8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let user = "";
    let data = {};

    function showToast(text, err = false) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.background = err ? "#d32f2f" : "#2e7d32";
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
    }

    db.ref('/').on('value', (s) => {
        data = s.val() || {};
        if (user) updateUI();
    });

    function login() {
        const n = document.getElementById('l-name').value.trim();
        const p = document.getElementById('l-pass').value;
        if (!n || !p) return showToast("Заполни данные!", true);
        if (data.users && data.users[n]) {
            if (data.users[n].pass === p) { user = n; start(); }
            else showToast("Неверный пароль!", true);
        } else {
            db.ref('users/' + n).set({ pass: p, balance: 100, current_job: "Безработный", weekly_pay: 0, last_salary: 0 })
            .then(() => { user = n; start(); });
        }
    }

    function start() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-display').innerText = user;
        db.ref('presence/' + user).set(true);
        db.ref('presence/' + user).onDisconnect().remove();
        if (user === "Мирон" || user === "Маша") {
            document.getElementById('n-admin').classList.remove('hidden');
            if (user === "Мирон") document.getElementById('adm-miron-only').classList.remove('hidden');
        }
    }

    function updateUI() {
        const u = data.users[user] || {};
        document.getElementById('bank-bal').innerText = (u.balance || 0) + " ББ";
        document.getElementById('job-title').innerText = u.current_job;
        document.getElementById('job-pay').innerText = u.weekly_pay;

        // Паспорт
        const req = (data.requests || []).find(r => r.user === user);
        const st = document.getElementById('passport-status');
        const view = document.getElementById('passport-view');
        if (!req) st.innerText = "❌ Нет паспорта";
        else if (req.status === 'waiting') st.innerText = "⌛ На проверке";
        else {
            st.innerText = "✅ Паспорт готов!";
            view.classList.remove('hidden');
            document.getElementById('pv-name').innerText = req.name;
            document.getElementById('pv-age').innerText = req.age;
        }

        // Рендер списков (Работа и ВБ)
        renderWork();
        renderWB();

        // Чат
        const chat = document.getElementById('chat-box');
        chat.innerHTML = Object.values(data.messages || {}).slice(-15).map(m => `<div class="msg ${m.u === user ? 'msg-my' : ''}"><b>${m.u}</b>: ${m.t}</div>`).join('');
        chat.scrollTop = chat.scrollHeight;

        // Список для админов
        if (user === "Мирон" || user === "Маша") {
            const list = document.getElementById('users-list-admin');
            list.innerHTML = Object.keys(data.users).map(name => {
                const on = data.presence && data.presence[name];
                return `<div class="user-row"><span>${name}</span><span><span class="dot" style="background:${on?'#4caf50':'#bbb'}"></span> ${on?'Online':'Off'}</span></div>`;
            }).join('');
            
            document.getElementById('adm-pass-list').innerHTML = (data.requests || []).filter(r => r.status === 'waiting').map(r => `
                <div class="user-row">${r.user} <button onclick="approvePass(${r.id})" style="background:var(--ok); color:white; border:none; padding:3px 7px; border-radius:5px;">OK</button></div>
            `).join('') || "Нет заявок";
        }
    }

    function renderWork() {
        document.getElementById('vac-list').innerHTML = (data.job_vacancies || []).map((v, i) => `
            <div class="card" style="display:flex; justify-content:space-between;">
                <span><b>${v.title}</b><br><small>${v.pay} ББ/нед.</small></span>
                <div>
                    <button onclick="takeJob(${i})" style="background:var(--main); color:white; border:none; padding:5px 10px; border-radius:5px;">Взять</button>
                    ${(v.creator === user || user === "Мирон") ? `<button onclick="delItem('job_vacancies', ${i})" style="background:var(--err); color:white; border:none; padding:5px 10px; border-radius:5px; margin-left:5px;">🗑️</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function renderWB() {
        document.getElementById('market-list').innerHTML = (data.market || []).map((m, i) => `
            <div class="card" style="display:flex; justify-content:space-between;">
                <span>🛍️ <b>${m.name}</b><br><small>${m.cost} ББ</small></span>
                <div>
                    <button onclick="buyItem(${i})" style="background:var(--wb); color:white; border:none; padding:5px 10px; border-radius:5px;">Купить</button>
                    ${(m.seller === user || user === "Мирон") ? `<button onclick="delItem('market', ${i})" style="background:var(--err); color:white; border:none; padding:5px 10px; border-radius:5px; margin-left:5px;">🗑️</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function addVac() {
        const t = document.getElementById('v-title').value;
        const p = document.getElementById('v-pay').value;
        if(t && p) {
            let v = data.job_vacancies || []; v.push({ title: t, pay: p, creator: user });
            db.ref('job_vacancies').set(v); showToast("Вакансия добавлена!");
        }
    }

    function addMarketItem() {
        const n = document.getElementById('m-name').value;
        const c = document.getElementById('m-cost').value;
        if(n && c) {
            let m = data.market || []; m.push({ name: n, cost: c, seller: user });
            db.ref('market').set(m); showToast("Товар на полке!");
        }
    }

    function delItem(path, i) {
        let arr = data[path]; arr.splice(i, 1);
        db.ref(path).set(arr).then(() => showToast("Удалено"));
    }

    function takeJob(i) {
        const v = data.job_vacancies[i];
        db.ref('users/' + user).update({ current_job: v.title, weekly_pay: v.pay });
        showToast("Вы устроились!");
    }

    function buyItem(i) {
        const it = data.market[i];
        if (data.users[user].balance >= it.cost) {
            db.ref('users/' + user + '/balance').set(data.users[user].balance - it.cost);
            db.ref('users/' + it.seller + '/balance').set((data.users[it.seller].balance || 0) + Number(it.cost));
            delItem('market', i); showToast("Куплено!");
        } else showToast("Мало ББ", true);
    }

    function adminHire(isH) {
        const target = document.getElementById('hire-user').value.trim();
        if (!data.users[target]) return showToast("Нет такого бобра", true);
        db.ref('users/' + target).update({
            current_job: isH ? document.getElementById('hire-job').value : "Безработный",
            weekly_pay: isH ? document.getElementById('hire-pay').value : 0
        });
        showToast("Данные обновлены");
    }

    function sendFine() {
        const t = document.getElementById('fine-user').value.trim();
        const s = Number(document.getElementById('fine-sum').value);
        if (data.users[t]) {
            db.ref('users/' + t + '/balance').set(data.users[t].balance - s);
            showToast("Штраф выписан");
        }
    }

    function printMoney() {
        const s = Number(document.getElementById('print-sum').value);
        db.ref('users/Мирон/balance').set((data.users['Мирон'].balance || 0) + s);
        showToast("Напечатано!");
    }

    function sendPassportReq() {
        const nm = document.getElementById('ank-name').value;
        const ag = document.getElementById('ank-age').value;
        let reqs = data.requests || [];
        reqs.push({ id: Date.now(), user: user, name: nm, age: ag, status: 'waiting' });
        db.ref('requests').set(reqs); showToast("Отправлено!");
    }

    function approvePass(id) {
        let rs = data.requests; let r = rs.find(x => x.id === id);
        if(r) r.status = 'approved'; db.ref('requests').set(rs);
    }

    function doTransfer() {
        const to = document.getElementById('tr-to').value;
        const s = Number(document.getElementById('tr-sum').value);
        if (data.users[to] && data.users[user].balance >= s) {
            db.ref('users/'+user+'/balance').set(data.users[user].balance - s);
            db.ref('users/'+to+'/balance').set((data.users[to].balance || 0) + s);
            showToast("Переведено!");
        }
    }

    function claimSalary() {
        const u = data.users[user];
        if (Date.now() - (u.last_salary || 0) > 7*24*60*60*1000) {
            db.ref('users/'+user).update({ balance: u.balance + Number(u.weekly_pay), last_salary: Date.now() });
            showToast("ЗП получена!");
        } else showToast("Еще не прошла неделя!", true);
    }

    function sendMsg() {
        const t = document.getElementById('msg-input').value;
        if(t) { db.ref('messages').push({ u: user, t: t }); document.getElementById('msg-input').value = ""; }
    }

    function setTab(t, el) {
        document.querySelectorAll('[id^="tab-"]').forEach(x => x.classList.add('hidden'));
        document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).classList.remove('hidden'); el.classList.add('active');
    }
</script>
</body>
</html>
